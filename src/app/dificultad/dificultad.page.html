<ion-content [fullscreen]="true" class="dificultad-content">
  <div class="dif-container">
    <div class="dif-header">
      <button class="back-btn" (click)="volver()">←</button>
      <h2>Elige dificultad</h2>
      <span></span>
    </div>

    <p class="section-sub">Selecciona el tamaño del tablero</p>

    <div class="difficulty-list">
      <div class="difficulty-card" [class.selected]="seleccion === 'facil'" (click)="seleccionar('facil')">
        <div class="dif-left">
          <span class="dif-emoji">🟢</span>
          <div class="dif-info">
            <span class="dif-title">Fácil</span>
            <span class="dif-sub">4×3 &middot; 6 parejas</span>
          </div>
        </div>
        <div class="check" *ngIf="seleccion === 'facil'">✓</div>
      </div>

      <div class="difficulty-card" [class.selected]="seleccion === 'medio'" (click)="seleccionar('medio')">
        <div class="dif-left">
          <span class="dif-emoji">🟡</span>
          <div class="dif-info">
            <span class="dif-title">Medio</span>
            <span class="dif-sub">4×4 &middot; 8 parejas</span>
          </div>
        </div>
        <div class="check" *ngIf="seleccion === 'medio'">✓</div>
      </div>

      <div class="difficulty-card" [class.selected]="seleccion === 'dificil'" (click)="seleccionar('dificil')">
        <div class="dif-left">
          <span class="dif-emoji">🔴</span>
          <div class="dif-info">
            <span class="dif-title">Difícil</span>
            <span class="dif-sub">5×4 &middot; 10 parejas</span>
          </div>
        </div>
        <div class="check" *ngIf="seleccion === 'dificil'">✓</div>
      </div>
    </div>

    <button class="btn-primary" [disabled]="!seleccion" (click)="comenzar()">
      Comenzar
    </button>
  </div>
</ion-content>
