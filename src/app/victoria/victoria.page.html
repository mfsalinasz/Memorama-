<ion-content [fullscreen]="true" class="victoria-content">
  <div class="victoria-container">

    <div class="glow-ring">
      <div class="trophy">🏆</div>
    </div>

    <div class="text-area">
      <h1>¡Completado!</h1>
      <p class="sub">Encontraste todas las parejas</p>
    </div>

    <div class="result-card">
      <div class="result-row">
        <span class="result-label">🎯 Movimientos</span>
        <span class="result-value">{{ movimientos }}</span>
      </div>
      <div class="divider"></div>
      <div class="result-row">
        <span class="result-label">⏱ Tiempo</span>
        <span class="result-value">{{ tiempo }}</span>
      </div>
      <div class="divider"></div>
      <div class="result-row">
        <span class="result-label">⚡ Dificultad</span>
        <span class="result-value capitalize">{{ dificultad }}</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" (click)="jugarOtraVez()">
        Jugar Otra Vez
      </button>
      <button class="btn-ghost" (click)="irAlMenu()">
        Menú Principal
      </button>
    </div>

  </div>
</ion-content>
